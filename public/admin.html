<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a3a6b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="IISER Shifts">
  <title>Admin Dashboard - IISER Shift</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/img/pwa-icon-192.png">
  <link rel="apple-touch-icon" href="/img/pwa-icon-180.png">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-brand">
    <img src="/img/iiserb-logo.png" alt="IISER Bhopal Logo">
    <span>IISER Bhopal - Shift Admin</span>
  </div>
  <div class="navbar-actions">
    <span class="navbar-info" id="admin-name"></span>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="page-wrapper container">
  <div class="stats-grid" id="stats-grid">
    <div class="stat-card stat-card-click" onclick="openStatView('workers')"><div class="stat-value" id="s-workers">-</div><div class="stat-label">Total Workers</div></div>
    <div class="stat-card stat-card-click" onclick="openStatView('leaves')"><div class="stat-value" id="s-leaves">-</div><div class="stat-label">Pending Leaves</div></div>
    <div class="stat-card stat-card-click" onclick="openStatView('unconfirmed')"><div class="stat-value" id="s-confirm">-</div><div class="stat-label">Unconfirmed Shifts</div></div>
    <div class="stat-card stat-card-click" onclick="openStatView('today')"><div class="stat-value" id="s-today">-</div><div class="stat-label">Today's Shifts</div></div>
  </div>

  <div class="tab-nav">
    <button class="tab-btn active" onclick="showTab('workers', this)">Workers</button>
    <button class="tab-btn" onclick="showTab('schedule', this)">Schedule View</button>
    <button class="tab-btn" onclick="showTab('leaves', this)">Leave Requests</button>
    <button class="tab-btn" onclick="showTab('profile-requests', this)">Profile Changes</button>
    <button class="tab-btn" onclick="showTab('community', this)">Community</button>
    <button class="tab-btn" onclick="showTab('create', this)">Add Worker</button>
  </div>

  <div class="tab-content active" id="tab-workers">
    <div class="card">
      <div class="card-header">Workers</div>
      <div class="search-bar">
        <input type="text" id="worker-search" class="form-control" placeholder="Search by name..." oninput="searchWorkers()">
      </div>
      <div id="worker-list"><div class="empty-state">Loading...</div></div>
    </div>
  </div>

  <div class="tab-content" id="tab-schedule">
    <div class="card schedule-card-wide">
      <div class="card-header">Schedule View</div>
      <div class="schedule-toolbar">
        <button class="btn btn-outline schedule-arrow" onclick="moveScheduleWindow(-1)" title="Previous day">&larr;</button>
        <div>
          <label class="form-label">Start Date</label>
          <input type="date" id="sched-from" class="form-control" onchange="loadScheduleView()">
        </div>
        <div>
          <label class="form-label">Designation</label>
          <select id="sched-designation" class="form-control" onchange="loadScheduleView()">
            <option value="SG" selected>SG</option>
            <option value="DSG">DSG</option>
            <option value="SS">SS</option>
            <option value="LSG">LSG</option>
            <option value="GM">GM</option>
            <option value="FSG">FSG</option>
            <option value="I/C">I/C</option>
            <option value="all">Show All</option>
          </select>
        </div>
        <button class="btn btn-outline schedule-arrow" onclick="moveScheduleWindow(1)" title="Next day">&rarr;</button>
        <input type="hidden" id="sched-to">
      </div>
      <div class="table-wrap schedule-table-wrap" id="sched-table-wrap">
        <div class="empty-state">Loading schedule...</div>
      </div>
    </div>
  </div>

  <div class="tab-content" id="tab-leaves">
    <div class="card">
      <div class="card-header">Pending Leave Requests</div>
      <div class="table-wrap" id="leaves-table"><div class="empty-state">Loading...</div></div>
    </div>
  </div>

  <div class="tab-content" id="tab-profile-requests">
    <div class="card">
      <div class="card-header">Pending Profile Change Requests</div>
      <div class="table-wrap" id="profile-requests-table"><div class="empty-state">Loading...</div></div>
    </div>
  </div>

  <div class="tab-content" id="tab-community">
    <div class="community-layout">
      <div class="card community-compose">
        <div class="card-header">Post to Community</div>
        <div id="community-msg"></div>
        <div class="form-group">
          <label class="form-label">Message</label>
          <textarea id="community-text" class="form-control" rows="4" placeholder="Write an update, instruction, or alert..."></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Audience</label>
          <select id="community-target" class="form-control">
            <option value="all">Everyone</option>
            <option value="SG">Security Guard (SG)</option>
            <option value="DSG">Deputy Security Guard (DSG)</option>
            <option value="SS">Senior Supervisor (SS)</option>
            <option value="LSG">Lady Security Guard (LSG)</option>
            <option value="GM">Gunman (GM)</option>
            <option value="FSG">Fire Security Guard (FSG)</option>
            <option value="I/C">Shift In-Charge (I/C)</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Media</label>
          <input type="file" id="community-media" class="form-control" accept="image/*,video/*" multiple>
        </div>
        <label class="community-alert-toggle">
          <input type="checkbox" id="community-alert">
          <span>Alert / emergency post</span>
        </label>
        <button class="btn btn-primary" onclick="createCommunityPost()">Post</button>
      </div>
      <div class="card community-feed-card">
        <div class="card-header">Community Feed</div>
        <div id="community-feed"><div class="empty-state">Loading...</div></div>
      </div>
    </div>
  </div>

  <div class="tab-content" id="tab-create">
    <div class="card" style="max-width:500px;">
      <div class="card-header">Add New Worker</div>
      <div id="create-msg"></div>
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" id="new-name" class="form-control" placeholder="Worker Name">
      </div>
      <div class="form-group">
        <label class="form-label">Phone Number</label>
        <input type="tel" id="new-phone" class="form-control" placeholder="Registered phone number">
      </div>
      <div class="form-group">
        <label class="form-label">SSID</label>
        <input type="text" id="new-ssid" class="form-control" placeholder="Worker SSID">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="new-email" class="form-control" placeholder="worker@example.com">
      </div>
      <div class="form-group">
        <label class="form-label">Designation</label>
        <select id="new-desig" class="form-control">
          <option value="SG">Security Guard (SG)</option>
          <option value="DSG">Deputy Security Guard (DSG)</option>
          <option value="SS">Senior Supervisor (SS)</option>
          <option value="LSG">Lady Security Guard (LSG)</option>
          <option value="GM">Gunman (GM)</option>
          <option value="FSG">Fire Security Guard (FSG)</option>
          <option value="I/C">Shift In-Charge (I/C)</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="new-password" class="form-control" placeholder="Initial password">
      </div>
      <button class="btn btn-primary" onclick="createWorker()">Create Worker</button>
    </div>
  </div>
</div>

<script src="/js/logout-confirm.js"></script>
<script src="/js/pwa.js"></script>
<script src="/js/admin.js"></script>
</body>
</html>
