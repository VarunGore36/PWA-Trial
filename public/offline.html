<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a3a6b">
  <title>Offline - IISER Shifts</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/img/pwa-icon-192.png">
  <link rel="apple-touch-icon" href="/img/pwa-icon-180.png">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <main class="offline-page">
    <section class="offline-panel">
      <img src="/img/iiserb-logo.png" alt="IISER Bhopal Logo">
      <h1>You are offline</h1>
      <p>Saved pages can still open, but live shift data, login, approvals, and schedule updates need a connection.</p>
      <button class="btn btn-primary" type="button" onclick="window.location.reload()">Try Again</button>
    </section>
  </main>
  <script src="/js/pwa.js"></script>
</body>
</html>
